services:
  - type: web
    name: kerja-praktek-spk-bansos
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --chdir backend app:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 300
    envVars:
      - key: SPK_SECRET_KEY
        sync: false
      - key: SPK_DEFAULT_ADMIN_USERNAME
        value: admin
      - key: SPK_DEFAULT_ADMIN_PASSWORD
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: FLASK_DEBUG
        value: "0"
